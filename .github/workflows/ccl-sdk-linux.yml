name: CCL SDK for Linux

concurrency:
  group: ccl-sdk-container
  
on: workflow_call
  
jobs:
  build:
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: ubuntu-latest
            image: ccl-linux-sdk:22.04
            targetos: linux
            signbinaries: false
            
    runs-on: ${{matrix.host}}
    
    permissions:
      contents: read
      packages: read
      
    container:
      image: ghcr.io/cclsoftware/${{matrix.image}}
      credentials:
        username: ${{github.actor}}
        password: ${{secrets.GITHUB_TOKEN}}
        
    steps:
    
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
    
      - name: Prepare build environment
        uses: ./.github/ci/${{ matrix.targetos }}/prepare-build-environment
        with:
          targetos: ${{ matrix.targetos }}
    
      - name: Prepare SDK build environment
        shell: bash
        run: |
          .github/ci/${{matrix.targetos }}/prepare_sdk_environment.sh
          
      - name: Fix Linux Arm64 build
        if: ${{ matrix.targetos == 'linux' }}
        shell: bash
        run: |
          cd framework
          git apply ../patches/linux-vulkan.patch
        
      - name: Configure CMake Project
        shell: bash
        run: |
          .github/ci/${{ matrix.targetos }}/configure_cmake_project.sh
        env:
          BUILD_DIR: "build/sdk"
          CMAKE_BUILD_OPTIONS: "${CMAKE_BUILD_OPTIONS} -DBUILD_sdk=ON"
       
      - name: Build Release Binaries
        shell: bash
        run: |
          .github/ci/${{ matrix.targetos }}/build_cmake_target.sh
        env:
          BUILD_DIR: "build/sdk"
          BUILD_CONFIG: Release
       
      - name: Build Debug Binaries
        shell: bash
        run: |
          .github/ci/${{ matrix.targetos }}/build_cmake_target.sh
        env:
          BUILD_DIR: "build/sdk"
          BUILD_CONFIG: Debug
       
      - name: Package
        shell: bash
        run: |
          cd development/cmake/build/sdk    
          cpack -C 'Debug;Release' --config SdkPackageConfig.cmake ${CPACK_OPTIONS}
          
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ccl-sdk-${{matrix.targetos}}
          path: |
            build/cmake/archive/*.gz
            build/cmake/archive/*.sh
