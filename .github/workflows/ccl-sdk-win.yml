name: CCL SDK for Windows

concurrency:
  group: ccl-sdk-win
  
on: workflow_dispatch
  
jobs:
  build:
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: windows-2025
            image: ccl-win-sdk:latest
            targetos: win
            signbinaries: true
            
    runs-on: ${{matrix.host}}
    
    permissions:
      contents: read
      packages: read
      
    steps:
    
      - name: Log into registry
        uses: docker/login-action@v3.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Pull container
        shell: bash
        run: |
          docker pull ghcr.io/cclsoftware/${{matrix.image}}
          
      - name: Initialize container
        shell: bash
        run: |
          container_id=$(docker create --volume "${{github.workspace}}:F:" --workdir "F:" ghcr.io/cclsoftware/${{matrix.image}})
          echo "CONTAINER_ID=${container_id}" >> "$GITHUB_ENV"
          echo "DOCKERCMD=docker exec ${container_id}" >> "$GITHUB_ENV"
          docker start "${container_id}"
          
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
    
      - name: Prepare environment
        shell: bash
        run: |
          ${DOCKERCMD} .github/ci/${{matrix.targetos}}/prepare_sdk_environment.sh
          
      - name: Prepare workingcopy
        shell: bash
        run: |
          ${DOCKERCMD} .github/ci/shared/prepare_workingcopy.sh ${{github.run_number}}
      
      - name: Configure CMake
        shell: bash
        #env:
        #  ccl_SIGNING_AZURE_SECRET: ${{ secrets.SIGNING_AZURE_SECRET }}
        run: |
          ${DOCKERCMD} bash -c 'cd development/cmake && cmake -B build/sdk --fresh --preset ${CMAKE_PRESET} -DBUILD_sdk=ON ${CMAKE_BUILD_OPTIONS}'
          
      - name: Build
        shell: bash
        run: |
          ${DOCKERCMD} bash -c 'cd development/cmake/build/sdk && cmake --build . --config Debug && cmake --build . --config Release'
         
      - name: Sign Binaries
        shell: bash
        run: |
          ${DOCKERCMD} bash -c 'cd development/cmake/build/sdk && cmake --build . --config Debug --target sign_ccl_binaries && cmake --build . --config Release --target sign_ccl_binaries'
          
      - name: Package
        shell: bash
        run: |
          ${DOCKERCMD} bash -c 'cpack -C "Debug;Release" --config SdkPackageConfig.cmake ${CPACK_OPTIONS}'
          
      - name: Sign Package
        if: matrix.signbinaries
        shell: bash
        run: |
          ${DOCKERCMD} bash -c 'cd development/cmake/build/sdk && cmake --build . --config Release --target signed_sdkpackage'
          
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ccl-sdk-${{matrix.targetos}}
          path: |
            build/cmake/archive/*.*
